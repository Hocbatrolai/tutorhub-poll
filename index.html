<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Khảo sát lịch học - TutorHub Enterprise</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #F8FAFC; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* Tooltip custom cho Heatmap */
        .tooltip .tooltip-text {
            visibility: hidden; background-color: #1E293B; color: #fff; text-align: center;
            padding: 8px 12px; border-radius: 8px; position: absolute; z-index: 50;
            bottom: 110%; left: 50%; transform: translateX(-50%); opacity: 0; transition: opacity 0.2s;
            white-space: nowrap; font-size: 12px; font-weight: 500; box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            pointer-events: none;
        }
        .tooltip:hover .tooltip-text { visibility: visible; opacity: 1; }
        
        /* Chống bôi đen text khi kéo thả */
        .select-none { user-select: none; -webkit-user-select: none; }

        /* ==========================================
           HIỆU ỨNG VIỀN VÀNG BÓNG (ENTERPRISE GOLD GLOW)
           ========================================== */
        .enterprise-gold-text {
            background: linear-gradient(
                135deg, 
                #C59B27 0%, 
                #FCECA8 25%, 
                #D4AF37 50%, 
                #FCECA8 75%, 
                #C59B27 100%
            );
            background-size: 200% auto;
            color: transparent;
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-stroke: 1px rgba(212, 175, 55, 0.7);
            filter: drop-shadow(0 0 8px rgba(212, 175, 55, 0.6)) 
                    drop-shadow(0 0 20px rgba(252, 236, 168, 0.4));
            animation: goldShine 4s linear infinite;
        }

        @keyframes goldShine {
            to { background-position: 200% center; }
        }
    </style>
</head>
<body class="text-slate-800">

<div class="max-w-7xl mx-auto px-4 py-10 sm:px-6 lg:px-8">
    
    <div id="loading" class="text-center py-20 text-slate-500 font-medium text-lg">
        🔄 Đang tải thông tin khảo sát lịch...
    </div>

    <div id="mainContent" style="display: none;">
        
        <div class="text-center mb-10">
            <div class="flex flex-col sm:flex-row items-center justify-center gap-3 mb-6">
                <img src="https://i.postimg.cc/j242t9sM/Tutor-Hub-(40-x-40-px)-(512-x-512-px)-(1).png" class="w-12 h-12 rounded-xl shadow-md">
                <h1 class="text-3xl font-extrabold tracking-tight flex items-center">
                    <span class="text-slate-900">TutorHub</span>
                    <span class="enterprise-gold-text ml-2">Enterprise</span>
                </h1>
            </div>
            
            <h2 class="text-4xl font-bold text-slate-900 mb-3" id="pollTitle">Đang tải...</h2>
            <p class="text-slate-500 text-lg" id="pollDesc">Cùng tham gia chọn lịch nhé!</p>
        </div>

        <div class="max-w-2xl mx-auto bg-white rounded-[24px] p-6 shadow-sm border border-slate-100 mb-10">
            <div class="flex flex-col sm:flex-row gap-4 items-end">
                <div class="w-full">
                    <label class="block text-sm font-semibold text-slate-700 mb-1">Tên của bạn <span class="text-red-500">*</span></label>
                    <input type="text" id="voterName" placeholder="VD: Nguyễn Văn A" class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:border-violet-500 focus:ring-2 focus:ring-violet-200 outline-none transition-all">
                </div>
                <div class="w-full">
                    <label class="block text-sm font-semibold text-slate-700 mb-1">Mật khẩu (Tùy chọn)</label>
                    <input type="password" id="voterPass" placeholder="Dùng để sửa lịch sau này" class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:border-violet-500 focus:ring-2 focus:ring-violet-200 outline-none transition-all">
                </div>
                <button onclick="handleLogin()" class="w-full sm:w-auto px-8 py-3 bg-slate-900 hover:bg-slate-800 text-white font-semibold rounded-xl transition-all whitespace-nowrap shadow-md border border-slate-700/70 hover:border-violet-500/60 ring-4 ring-slate-900/5 focus:ring-violet-500/20 outline-none">Đăng nhập</button>
            </div>
            <p id="loginMsg" class="text-sm mt-3 hidden"></p>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 mb-10">
            
            <div class="bg-white rounded-[24px] p-6 shadow-sm border border-slate-100 flex flex-col h-full">
                <div class="mb-6">
                    <h2 class="inline-flex items-center gap-2.5 px-4 py-2.5 bg-gradient-to-r from-slate-50 to-white border border-slate-200/80 rounded-2xl shadow-sm shadow-slate-100/50 text-base font-bold text-slate-800 ring-4 ring-slate-100/40">
                        <svg class="w-5 h-5 text-violet-500" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M6.75 3v2.25M17.25 3v2.25M3 18.75V7.5a2.25 2.25 0 012.25-2.25h13.5A2.25 2.25 0 0121 7.5v11.25m-18 0A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75m-18 0v-7.5A2.25 2.25 0 015.25 9h13.5A2.25 2.25 0 0121 11.25v7.5" />
                        </svg>
                        Lịch rảnh của bạn
                    </h2>
                    <p class="text-sm text-slate-500 mt-2.5 pl-1">Nhấp hoặc kéo thả chuột để đánh dấu thời gian rảnh</p>
                </div>
                
                <div class="overflow-x-auto hide-scrollbar border border-slate-100 rounded-xl relative select-none">
                    <div id="myGrid" class="min-w-[500px]"></div>
                </div>

                <div class="mt-5 flex items-center gap-6 text-sm font-medium text-slate-600">
                    <div class="flex items-center gap-2"><div class="w-6 h-6 rounded bg-[#DDD6FE] border border-[#C4B5FD]"></div> Bạn rảnh</div>
                    <div class="flex items-center gap-2"><div class="w-6 h-6 rounded bg-white border border-slate-200"></div> Chưa chọn</div>
                </div>
            </div>

            <div class="bg-white rounded-[24px] p-6 shadow-sm border border-slate-100 flex flex-col h-full">
                <div class="mb-6 flex justify-between items-center">
                    <div>
                        <h2 class="inline-flex items-center gap-2.5 px-4 py-2.5 bg-gradient-to-r from-slate-50 to-white border border-slate-200/80 rounded-2xl shadow-sm shadow-slate-100/50 text-base font-bold text-slate-800 ring-4 ring-slate-100/40">
                            <svg class="w-5 h-5 text-slate-700" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M15 19.128a9.38 9.38 0 002.625.372 9.337 9.337 0 004.121-.952 4.125 4.125 0 00-7.533-2.493M15 19.128v-.003c0-1.113-.285-2.16-.786-3.07M15 19.128v.106A12.318 12.318 0 018.624 21c-2.331 0-4.512-.645-6.374-1.766l-.001-.109a6.375 6.375 0 0111.964-3.07M12 6.375a3.375 3.375 0 11-6.75 0 3.375 3.375 0 016.75 0zm8.25 2.25a2.625 2.625 0 11-5.25 0 2.625 2.625 0 015.25 0z" />
                            </svg>
                            Tổng hợp nhóm
                        </h2>
                        <p class="text-sm text-slate-500 mt-2.5 pl-1">Màu càng đậm, càng nhiều người rảnh</p>
                    </div>
                    <div class="text-sm font-bold text-violet-600 bg-violet-50 px-3 py-1.5 rounded-xl border border-violet-100">
                        <span id="totalParticipants">0</span> người
                    </div>
                </div>

                <div class="overflow-x-auto hide-scrollbar border border-slate-100 rounded-xl relative">
                    <div id="heatmapGrid" class="min-w-[500px]"></div>
                </div>

                <div class="mt-5">
                    <div class="flex justify-between text-xs text-slate-500 font-semibold mb-2">
                        <span>0 người rảnh</span>
                        <span>Nhiều người rảnh</span>
                    </div>
                    <div class="h-3 rounded-full w-full bg-gradient-to-r from-slate-100 via-[#C4B5FD] to-[#5B21B6]"></div>
                </div>
            </div>

        </div>

        <div class="text-center">
            <button id="btnSubmit" onclick="submitAvailability()" class="inline-flex items-center justify-center gap-2 px-10 py-4 bg-gradient-to-r from-violet-500 to-indigo-500 hover:from-violet-600 hover:to-indigo-600 text-white font-bold text-lg rounded-[18px] shadow-lg shadow-indigo-100/70 border border-white/20 ring-4 ring-indigo-500/10 hover:ring-indigo-500/20 transition-all transform hover:-translate-y-0.5 w-full sm:w-auto">
                <svg class="w-5 h-5 fill-current" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm4.64 6.8c-.15 1.58-.8 5.42-1.13 7.19-.14.75-.42 1-.68 1.03-.58.05-1.02-.38-1.58-.75-.88-.58-1.38-.94-2.23-1.5-.99-.65-.35-1.01.22-1.59.15-.15 2.71-2.48 2.76-2.69a.2.2 0 0 0-.05-.18c-.06-.05-.14-.03-.21-.02-.09.02-1.49.94-4.22 2.79-.4.27-.76.41-1.08.4-.36-.01-1.04-.2-1.55-.37-.63-.2-1.12-.31-1.08-.66.02-.18.27-.36.74-.55 2.92-1.27 4.86-2.11 5.83-2.51 2.78-1.16 3.35-1.36 3.73-1.36.08 0 .27.02.39.12.1.08.13.19.14.27-.01.06.01.24 0 .38z"/>
                </svg>
                Gửi thời gian rảnh của tôi
            </button>
        </div>
    </div>
</div>

<script>
    // ==========================================
    // CẤU HÌNH API 
    // ==========================================
    const BACKEND_URL = "https://tutorhub-poll-api.onrender.com";
    const urlParams = new URLSearchParams(window.location.search);
    const pollCode = urlParams.get("code");

    // State ứng dụng
    let globalPollId = null;
    let eventData = { dates: [], timeSlots: [], participants: [] };
    let myAvailability = {}; 
    
    // State Kéo thả
    let isDragging = false;
    let isSelecting = true; 

    // ==========================================
    // 1. TẢI DỮ LIỆU TỪ SERVER
    // ==========================================
    if (!pollCode) {
        document.getElementById("loading").innerHTML = "❌ Đường link không hợp lệ! Thiếu mã code khảo sát.";
    } else {
        loadData();
    }

    async function loadData() {
        try {
            const response = await fetch(`${BACKEND_URL}/api/poll/${pollCode}`);
            if (!response.ok) throw new Error();
            const data = await response.json();

            globalPollId = data.poll_id;
            document.getElementById("pollTitle").innerText = data.title;
            document.getElementById("pollDesc").innerText = data.description || "Hãy chọn khung giờ bạn rảnh nhé!";

            // Xử lý Ngày
            eventData.dates = JSON.parse(data.date_list);
            
            // Xử lý Giờ (Tạo mảng chia 30 phút từ start_time đến end_time)
            const startH = parseInt(data.start_time.split(":")[0]);
            const endH = parseInt(data.end_time.split(":")[0]);
            for (let h = startH; h < endH; h++) {
                const hourStr = String(h).padStart(2, "0");
                eventData.timeSlots.push(`${hourStr}:00`);
                eventData.timeSlots.push(`${hourStr}:30`);
            }

            // Xử lý Người tham gia (Chuyển đổi dữ liệu JSON từ DB)
            eventData.participants = data.votes.map(v => ({
                name: v.voter_name,
                password: v.password, 
                availability: JSON.parse(v.available_slots)
            }));

            document.getElementById('totalParticipants').innerText = eventData.participants.length;

            // Khởi tạo state rỗng cho bản thân
            eventData.dates.forEach(d => myAvailability[d] = []);

            document.getElementById("loading").style.display = "none";
            document.getElementById("mainContent").style.display = "block";

            renderMyGrid();
            renderHeatmap();
        } catch (err) {
            document.getElementById("loading").innerHTML = "❌ Không tìm thấy cuộc khảo sát hoặc lỗi kết nối máy chủ!";
        }
    }

    // ==========================================
    // 2. LOGIC ĐĂNG NHẬP (LẤY LẠI LỊCH CŨ)
    // ==========================================
    function handleLogin() {
        const name = document.getElementById("voterName").value.trim();
        const pass = document.getElementById("voterPass").value.trim();
        const msg = document.getElementById("loginMsg");

        if (!name) {
            showMessage(msg, "Vui lòng nhập tên của bạn!", "red");
            return;
        }

        const existingUser = eventData.participants.find(p => p.name === name);
        
        if (existingUser) {
            if (existingUser.password && existingUser.password !== pass) {
                showMessage(msg, "Tên này đã được sử dụng. Vui lòng nhập đúng mật khẩu!", "red");
                return;
            }
            // Mật khẩu đúng -> Nạp lại lịch cũ
            myAvailability = JSON.parse(JSON.stringify(existingUser.availability));
            
            // Nếu có ngày nào mới thêm vào poll mà user chưa có thì khởi tạo mảng rỗng
            eventData.dates.forEach(d => { if(!myAvailability[d]) myAvailability[d] = []; });
            
            showMessage(msg, `Chào mừng trở lại, ${name}! Đã tải lịch rảnh cũ của bạn.`, "green");
        } else {
            // Người mới -> Làm sạch lịch
            eventData.dates.forEach(d => myAvailability[d] = []);
            showMessage(msg, `Đăng nhập thành công với tên ${name}! Bạn có thể bắt đầu chọn lịch.`, "violet");
        }
        renderMyGrid(); // Vẽ lại bảng bên trái
    }

    // ==========================================
    // 3. RENDER BẢNG LỊCH CỦA BẠN (CÓ KÉO THẢ)
    // ==========================================
    function renderMyGrid() {
        const grid = document.getElementById('myGrid');
        grid.innerHTML = '';
        grid.style.display = 'grid';
        grid.style.gridTemplateColumns = `60px repeat(${eventData.dates.length}, minmax(80px, 1fr))`;

        // Hàng 1: Header Ngày
        grid.appendChild(createCell('', 'bg-slate-50 border-b border-slate-200 sticky left-0 z-20'));
        eventData.dates.forEach(date => {
            const dateObj = new Date(date);
            const formatted = dateObj.toLocaleDateString('vi-VN', { weekday: 'short', day: 'numeric', month: 'numeric' });
            grid.appendChild(createCell(formatted, 'bg-slate-50 font-bold text-slate-700 border-b border-slate-200 text-center py-3 text-xs sm:text-sm sticky top-0 z-10'));
        });

        // Hàng 2+: Các khung giờ
        eventData.timeSlots.forEach(time => {
            // Cột mốc giờ bên trái
            const isFullHour = time.endsWith(":00");
            const timeLabel = isFullHour ? time : ""; 
            grid.appendChild(createCell(timeLabel, 'bg-white text-xs font-semibold text-slate-400 border-r border-slate-100 text-right pr-2 py-1 sticky left-0 z-10 ' + (isFullHour ? 'border-t' : '')));

            // Các ô tương tác
            eventData.dates.forEach(date => {
                const cell = document.createElement('div');
                const isSelected = myAvailability[date] && myAvailability[date].includes(time);
                
                let baseClass = 'border-r border-slate-100 h-6 transition-colors duration-75 cursor-pointer cell-interactive ' + (isFullHour ? 'border-t' : '');
                if (isSelected) {
                    baseClass += ' bg-[#DDD6FE] border-b border-b-[#C4B5FD]';
                } else {
                    baseClass += ' bg-white hover:bg-violet-50';
                }

                cell.className = baseClass;
                cell.dataset.date = date;
                cell.dataset.time = time;

                // Cài đặt sự kiện chuột
                cell.addEventListener('mousedown', (e) => handleMouseDown(e, cell, date, time));
                cell.addEventListener('mouseenter', (e) => handleMouseEnter(e, cell, date, time));
                
                grid.appendChild(cell);
            });
        });

        window.addEventListener('mouseup', () => { isDragging = false; });
    }

    // Logic Kéo thả
    function handleMouseDown(e, cell, date, time) {
        e.preventDefault();
        isDragging = true;
        const hasTime = myAvailability[date].includes(time);
        isSelecting = !hasTime;
        toggleTimeSlot(cell, date, time, isSelecting);
    }

    function handleMouseEnter(e, cell, date, time) {
        if (isDragging) {
            toggleTimeSlot(cell, date, time, isSelecting);
        }
    }

    function toggleTimeSlot(cell, date, time, forceSelect) {
        if (forceSelect) {
            if (!myAvailability[date].includes(time)) myAvailability[date].push(time);
            cell.classList.remove('bg-white', 'hover:bg-violet-50');
            cell.classList.add('bg-[#DDD6FE]', 'border-b-[#C4B5FD]');
        } else {
            myAvailability[date] = myAvailability[date].filter(t => t !== time);
            cell.classList.add('bg-white', 'hover:bg-violet-50');
            cell.classList.remove('bg-[#DDD6FE]', 'border-b-[#C4B5FD]');
        }
    }

    // ==========================================
    // 4. RENDER BẢNG TỔNG HỢP NHÓM (HEATMAP)
    // ==========================================
    function renderHeatmap() {
        const grid = document.getElementById('heatmapGrid');
        grid.innerHTML = '';
        grid.style.display = 'grid';
        grid.style.gridTemplateColumns = `60px repeat(${eventData.dates.length}, minmax(80px, 1fr))`;

        // Tính toán ma trận
        const summary = {};
        let maxCount = 0;
        
        eventData.dates.forEach(d => {
            summary[d] = {};
            eventData.timeSlots.forEach(t => summary[d][t] = { count: 0, names: [] });
        });

        eventData.participants.forEach(p => {
            if(!p.availability) return;
            for (let date in p.availability) {
                if(!summary[date]) continue;
                p.availability[date].forEach(time => {
                    if(summary[date][time]) {
                        summary[date][time].count++;
                        summary[date][time].names.push(p.name);
                        if (summary[date][time].count > maxCount) maxCount = summary[date][time].count;
                    }
                });
            }
        });

        // Hàng 1: Header Ngày
        grid.appendChild(createCell('', 'bg-slate-50 border-b border-slate-200 sticky left-0 z-20'));
        eventData.dates.forEach(date => {
            const dateObj = new Date(date);
            const formatted = dateObj.toLocaleDateString('vi-VN', { weekday: 'short', day: 'numeric', month: 'numeric' });
            grid.appendChild(createCell(formatted, 'bg-slate-50 font-bold text-slate-700 border-b border-slate-200 text-center py-3 text-xs sm:text-sm sticky top-0 z-10'));
        });

        // Hàng 2+: Heatmap
        eventData.timeSlots.forEach(time => {
            const isFullHour = time.endsWith(":00");
            const timeLabel = isFullHour ? time : ""; 
            grid.appendChild(createCell(timeLabel, 'bg-white text-xs font-semibold text-slate-400 border-r border-slate-100 text-right pr-2 py-1 sticky left-0 z-10 ' + (isFullHour ? 'border-t' : '')));

            eventData.dates.forEach(date => {
                const data = summary[date][time];
                const cell = document.createElement('div');
                cell.className = 'border-r border-slate-100 h-6 tooltip relative ' + (isFullHour ? 'border-t' : '');
                
                // Thuật toán chia màu sắc độ Heatmap
                if (data.count > 0) {
                    const intensity = data.count / maxCount;
                    let bgColor = '#F5F3FF'; 
                    if (intensity > 0.2) bgColor = '#EDE9FE';
                    if (intensity > 0.4) bgColor = '#DDD6FE';
                    if (intensity > 0.6) bgColor = '#C4B5FD';
                    if (intensity > 0.8) bgColor = '#8B5CF6';
                    if (intensity === 1 && maxCount > 1) bgColor = '#5B21B6'; 
                    
                    cell.style.backgroundColor = bgColor;

                    // Tooltip hiển thị danh sách tên
                    const tooltipText = document.createElement('span');
                    tooltipText.className = 'tooltip-text';
                    tooltipText.innerHTML = `<span class='text-violet-300'>${date} - ${time}</span><br/><b>${data.count} người rảnh:</b><br/>${data.names.join(', ')}`;
                    cell.appendChild(tooltipText);
                } else {
                    cell.classList.add('bg-white');
                }

                grid.appendChild(cell);
            });
        });
    }

    // ==========================================
    // 5. GỬI DỮ LIỆU LÊN SERVER
    // ==========================================
    async function submitAvailability() {
        const nameInput = document.getElementById('voterName').value.trim();
        const passInput = document.getElementById('voterPass').value.trim();
        const msg = document.getElementById('loginMsg');

        if (!nameInput) {
            showMessage(msg, "❌ Vui lòng nhập Tên của bạn trước khi gửi lịch rảnh.", "red");
            return;
        }

        let hasSelected = false;
        for (let d in myAvailability) { 
            if (myAvailability[d].length > 0) hasSelected = true; 
        }
        
        if (!hasSelected) {
            showMessage(msg, "⚠️ Bạn chưa bôi đen khung giờ rảnh nào trên lịch.", "violet");
            return;
        }

        try {
            // Đổi sang lưu trữ full HTML của nút để giữ cấu trúc SVG Telegram nguyên vẹn
            const btn = document.getElementById('btnSubmit');
            const originalHTML = btn.innerHTML;
            btn.innerHTML = "Đang lưu dữ liệu...";
            btn.disabled = true;

            const response = await fetch(`${BACKEND_URL}/api/vote`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    poll_id: globalPollId,
                    voter_name: nameInput,
                    voter_password: passInput,
                    available_slots: myAvailability
                })
            });

            const resData = await response.json();
            
            if (response.status === 403) {
                showMessage(msg, "❌ Tên này đã được sử dụng. Vui lòng nhập đúng mật khẩu để sửa lịch!", "red");
                btn.innerHTML = originalHTML;
                btn.disabled = false;
                return;
            }

            if (!response.ok) throw new Error();

            // Cập nhật state local ngay lập tức để UI phản hồi nhanh
            const existingUser = eventData.participants.find(p => p.name === nameInput);
            if (existingUser) {
                existingUser.availability = JSON.parse(JSON.stringify(myAvailability));
                existingUser.password = passInput;
            } else {
                eventData.participants.push({
                    name: nameInput,
                    password: passInput,
                    availability: JSON.parse(JSON.stringify(myAvailability))
                });
                document.getElementById('totalParticipants').innerText = eventData.participants.length;
            }

            renderHeatmap(); 

            // Nút chuyển trạng thái Success với các token màu nhạt tương ứng
            btn.innerHTML = "✓ Đã gửi thành công";
            btn.classList.replace('from-violet-500', 'from-emerald-500');
            btn.classList.replace('to-indigo-500', 'to-emerald-600');
            btn.classList.replace('shadow-indigo-100/70', 'shadow-emerald-200');
            
            showMessage(msg, "🎉 Lịch rảnh của bạn đã được ghi nhận lên hệ thống!", "green");

            setTimeout(() => {
                btn.innerHTML = originalHTML;
                btn.classList.replace('from-emerald-500', 'from-violet-500');
                btn.classList.replace('to-emerald-600', 'to-indigo-500');
                btn.classList.replace('shadow-emerald-200', 'shadow-indigo-100/70');
                btn.disabled = false;
            }, 3000);

        } catch (err) {
            showMessage(msg, "❌ Có lỗi xảy ra khi kết nối máy chủ. Vui lòng thử lại sau.", "red");
            btn.innerHTML = originalHTML;
            btn.disabled = false;
        }
    }

    // ==========================================
    // Utils
    // ==========================================
    function createCell(text, classes) {
        const div = document.createElement('div');
        div.className = classes;
        div.innerText = text;
        return div;
    }

    function showMessage(el, text, color) {
        el.innerText = text;
        el.className = `text-sm mt-3 font-medium block text-${color}-600`;
    }
</script>

</body>
</html>
